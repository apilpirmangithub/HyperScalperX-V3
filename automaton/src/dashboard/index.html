<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperScalperX | CLEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #888;
            --up: #00ffa3;
            --down: #ff3d71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #020205 70%);
        }
        .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 2rem; flex: 1; display: flex; flex-direction: column; gap: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .status { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: 600; background: var(--card); padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); }
        .dot { width: 8px; height: 8px; background: var(--up); border-radius: 50%; box-shadow: 0 0 10px var(--up); }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 24px; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; font-weight: 600; }
        .stat-value { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .main { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; flex: 1; min-height: 0; }
        section { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; display: flex; flex-direction: column; }
        h2 { font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }
        
        .scroll { flex: 1; overflow-y: auto; padding-right: 10px; }
        .scroll::-webkit-scrollbar { width: 4px; }
        .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 0.7rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        td { padding: 16px 12px; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
        
        .activity-item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .activity-meta { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.7rem; color: var(--accent); font-weight: 700; }
        .activity-time { color: var(--text-dim); }

        .pnl-up { color: var(--up); }
        .pnl-down { color: var(--down); }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Hyper<span>ScalperX</span> <small style="font-size: 0.6rem; opacity: 0.5; vertical-align: middle;">CLEAN BUILD</small></div>
            <div class="status">
                <div class="dot"></div>
                <span>HYPE_KING ACTIVE</span>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card">
                <div class="stat-label">Trading Capital (PERP)</div>
                <div class="stat-value" id="val-perp-big">$0.00</div>
                <div style="font-size: 0.65rem; color: var(--text-dim); margin-top: 10px; display: flex; gap: 12px; font-weight: 600;">
                    <span>SPOT (HOLDINGS): <span id="val-spot" style="color: var(--text);">$0.00</span></span>
                    <span>TOTAL: <span id="val-acc" style="color: var(--text);">$0.00</span></span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total P&L (All Time)</div>
                <div class="stat-value" id="val-pnl">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="val-wr">0.0%</div>
            </div>
        </div>

        <div class="main">
            <section>
                <h2>Trade History</h2>
                <div class="scroll">
                    <table id="table-trades">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Asset</th>
                                <th>Side</th>
                                <th>P&L</th>
                                <th>Reason</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
            <section>
                <h2>Live Activity</h2>
                <div class="scroll" id="list-activity"></div>
            </section>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                document.getElementById('val-acc').textContent = `$${data.hlAccountValue.toFixed(2)}`;
                document.getElementById('val-perp-big').textContent = `$${(data.perpValue || 0).toFixed(2)}`;
                document.getElementById('val-spot').textContent = `$${(data.spotBalance || 0).toFixed(2)}`;

                document.getElementById('val-pnl').textContent = `$${data.totalPnlUsdc.toFixed(2)}`;
                document.getElementById('val-pnl').className = 'stat-value ' + (data.totalPnlUsdc >= 0 ? 'pnl-up' : 'pnl-down');
                document.getElementById('val-wr').textContent = `${data.winRate.toFixed(1)}%`;

                const tbody = document.querySelector('#table-trades tbody');
                tbody.innerHTML = data.recentTrades.map(t => `
                    <tr>
                        <td style="font-size: 0.7rem; color: #666;">${new Date(t.close_time || t.open_time).toLocaleTimeString()}</td>
                        <td><strong>${t.market}</strong></td>
                        <td><span class="badge" style="color: ${t.side === 'LONG' ? '#00ffa3' : '#ff3d71'}">${t.side}</span></td>
                        <td class="${t.pnl_usdc >= 0 ? 'pnl-up' : 'pnl-down'}">${t.pnl_usdc >= 0 ? '+' : ''}$${(t.pnl_usdc || 0).toFixed(2)}</td>
                        <td style="font-size: 0.7rem; opacity: 0.5;">${t.close_reason || 'Open'}</td>
                    </tr>
                `).join('');

                const activity = document.getElementById('list-activity');
                activity.innerHTML = data.recentActivities.map(a => `
                    <div class="activity-item">
                        <div class="activity-meta">
                            <span>${a.type}</span>
                            <span class="activity-time">${new Date(a.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div>${a.message_en}</div>
                    </div>
                `).join('');

            } catch (e) { console.error(e); }
        }
        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
